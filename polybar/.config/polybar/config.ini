[colors]
bg = #1a1b26
fg = #a9b1d6
green = #00ff00


[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 24
background = ${colors.bg}
foreground = ${colors.fg}
font-0 = "JetBrainsMono Nerd Font:size=10;2"
font-1 = "JetBrainsMono Nerd Font:size=12;3"
modules-left = internet sep vpn sep target
modules-center = bspwm
modules-right = battery sep pulseaudio sep cpu memory date
enable-ipc = true
wm-restack = bspwm

[module/sep]
type = custom/text
content = " "
content-foreground = #1a1b26
content-padding = 1


[module/internet]
type = custom/script
exec = ~/.config/polybar/scripts/net_status.sh
interval = 3
format-background = #1a1b26
format-padding = 1
# Al hacer clic, abre el gestor de redes
click-left = kitty -e nmtui


[module/vpn]
type = custom/script
exec = ~/.config/polybar/scripts/vpn_status.sh
interval = 5
format-prefix = "󰖂 "
format-prefix-foreground = #00ff00
format-background = #1a1b26
format-padding = 1
label = %output%
click-left = ip addr show tun0 | grep -oP '(?<=inet\s)\d+(\.\d+){3}' | xclip -sel clip



[module/target]
type = custom/script
exec = if [ -s ~/.config/polybar/scripts/target.txt ]; then cat ~/.config/polybar/scripts/target.txt; else echo " "; fi
interval = 1
format = <label>
format-prefix = "󰓾 "
format-prefix-foreground = #ff0000
format-background = #1a1b26
format-padding = 1
label = %output%
label-minlen = 15
label-alignment = left
click-left = cat ~/.config/polybar/scripts/target.txt | xclip -sel clip


[module/cpu]
type = internal/cpu
label =  %percentage%%


[module/memory]
type = internal/memory
interval = 3
format-prefix = "RAM "
format-prefix-foreground = #00ff00
label = %percentage_used%%
format-background = #1a1b26
format-padding = 1


[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
label = %date%
label-foreground = #ffffff
format-background = #1a1b26
format-padding = 1


[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume>
label-volume = 󰕾 %percentage%%
label-volume-foreground = #00ff00
label-muted = 󰖁 Muted
label-muted-foreground = #ff0000
format-background = #1a1b26
format-padding = 1


[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98
format-charging = <label-charging>
format-discharging = <label-discharging>
label-charging = %{F#00ff00}󱐋%{F-} %percentage%%
label-discharging = %{F#ffff00}󰁹%{F-} %percentage%%
format-background = #1a1b26
format-padding = 1


[module/bspwm]
type = internal/bspwm
label-focused = 󰣇
label-focused-background = #3b4252
label-focused-underline= #00ff00
label-focused-padding = 2
label-occupied = 
label-occupied-padding = 2
label-urgent = %name%
label-urgent-background = #bd2c40
label-urgent-padding = 2
label-empty = 
label-empty-foreground = #55
label-empty-padding = 2



